services:
  web:
    image: ghcr.io/kientranasia/kien-blog:latest
    container_name: kien-blog-web
    restart: unless-stopped
    ports:
      # Cloudflare có thể trỏ trực tiếp tới port 1313 của host
      - "1313:1313"
    # Nếu bạn dùng reverse proxy ở ngoài (Nginx/Traefik), có thể bỏ ports mapping.
    # volumes:
    #   - ./public:/usr/share/nginx/html:ro
    depends_on:
      - cms-backend

  cms-backend:
    image: ghcr.io/njfamirm/decap-cms-github-backend:main
    container_name: decap-cms-backend
    restart: unless-stopped
    environment:
      # Set these via your shell / .env when you run `docker compose up -d`
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET}
      # OAUTH_GITHUB_REDIRECT_URL is handled by `backend.base_url` + /callback in Decap config.

