# URL tuyệt đối cho canonical, Open Graph, RSS, sitemap (SEO). Local: `hugo server` tự dùng host dev.
baseURL: https://kientran.asia/
relativeURLs: false
enableRobotsTXT: true
defaultContentLanguage: vi
languageCode: vi
title: Kiên Trần

theme: essay

params:
  home:
    hero_kicker: ""
    hero_lead: |
      Kiên Trần là CEO & Founder của TRANDAO, chuyên phát triển giải pháp AI và tự động hóa cho doanh nghiệp, giúp tối giản vận hành và mở rộng hiệu quả bằng công nghệ.
    # Ảnh hero trong thư mục /assets/ (ví dụ assets/KienTranDao_Banner.png)
    hero_image_asset: KienTranDao_Banner.png
    # Dự phòng: path trong /static/ nếu không dùng asset (để trống = không dùng)
    hero_image: ""
    posts_heading: "Bài viết"
    newsletter_heading: "Nhận bài qua email"
    newsletter_placeholder: "Nhận bản tin qua email"
    # URL backend nhận POST để đăng ký newsletter.
    # Ví dụ: "https://formsubmit.co/ajax/kientrancm@gmail.com"
    newsletter_subscribe_url: "https://formsubmit.co/ajax/kientrancm@gmail.com"
    # "json" hoặc "form" (application/x-www-form-urlencoded)
    newsletter_subscribe_format: "json"
    youtube_channel_url: "https://www.youtube.com/@kientranasia"
    youtube_channel_id: "UCpnvIYcMflly1nsJ9x6PDag"

  # Icon: facebook | linkedin | youtube | tiktok | instagram | zalo | github | x | mail | link
  social:
    - icon: facebook
      name: Facebook
      url: "https://www.facebook.com/kientranasia"
    - icon: github
      name: GitHub
      url: "https://github.com/kientranasia"
    - icon: x
      name: X
      url: "https://x.com/kientranasia"
    - icon: linkedin
      name: LinkedIn
      url: "https://www.linkedin.com/in/kientranasia"
    - icon: youtube
      name: YouTube
      url: "https://www.youtube.com/@kientranasia"
    - icon: instagram
      name: Instagram
      url: "https://instagram.com/kientranasia"

  home_recent_limit: 10
  home_category_limit: 5
  related_limit: 5
  # Bật nút “Đọc bài” (Text-to-Speech) trên mỗi bài posts. Tắt: false. Từng bài: front matter `tts: false`.
  post_tts: false
  footer:
    trandao_name: "TRANDAO INVESTMENT"
    trandao_url: "https://trandao.vn"
  author: Kiên Trần
  seo:
    # twitter:site — không bắt buộc; bỏ trống nếu không dùng
    twitter_site: "@kientranasia"
    og_locale: "vi_VN"
    og_locale_alternate: "en_US"
    theme_color: "#0f1413"
    # Tiêu đề tab trang chủ (meta & og:title). Để trống = chỉ dùng site.title ("Kiên Trần").
    home_title: "Kiên Trần · CEO TRANDAO | Chuyển đổi số, AI & tự động hóa"
    # Meta description trang chủ (~150–160 ký tự; khớp Google snippet)
    home_description: >-
      Blog của Kiên Trần — CEO TRANDAO: chuyển đổi số, AI và tự động hóa cho doanh nghiệp.
      Bài viết về startup, essays và happiness; 11+ năm thực chiến tại kientran.asia.
  # Mặc định toàn site + fallback khi trang không có description riêng
  description: >-
    Kiên Trần — CEO TRANDAO: tư vấn chuyển đổi số, AI & workflow automation cho doanh nghiệp.
    Blog: startup, essays, happiness. Đọc miễn phí.
  profile:
    name: Kiên Trần
    location: "Vietnam"
    roleLine: "Expert Consultant · CEO Athsent"
    badge: "Chuyển đổi số · BPR · Workflow Automation"
    intro: >-
      Với 11 năm thực chiến, tôi không bán phần mềm. Tôi mang đến tư duy Tái cấu trúc
      quy trình (BPR) kết hợp công nghệ.
    mission: >-
      Tại AutoAI, mục tiêu của tôi là gỡ bỏ “nút thắt” vận hành, giúp doanh nghiệp bạn
      chạy tự động ngay cả khi bạn vắng mặt.
    current: "Hiện tại · CEO & Founder · TRANDAO INVESTMENT"
    highlights:
      - title: "11+ năm"
        text: "Tư vấn chuyển đổi số & tự động hóa (BPR)"
      - title: "Workflow"
        text: "Chuyên gia Workflow Automation"
      - title: "Athsent"
        text: "CEO · nền tảng công nghệ"
      - title: "Đào tạo"
        text: "Đội ngũ kế thừa & vận hành"

  pillars:
    - name: Startup
      slug: startup
      hint: "Công ty, sản phẩm, BPR, tự động hóa, go-to-market."
    - name: Essays
      slug: essays
      hint: "Bài viết theo chiều sâu: quan sát, học hệ thống, và triết lý vận hành."
    - name: Happiness
      slug: happy
      # Khớp giá trị trong front matter categories: (Happy), không dùng "Happiness"
      category: Happy
      hint: "Đủ đầy, chơi, niềm vui nhỏ, bền vững cảm xúc."

menu:
  main:
    - name: Blogs
      identifier: blogs
      url: /posts/
      weight: 10
    - name: Startup
      identifier: startup
      url: /categories/startup/
      weight: 10
      parent: blogs
    - name: Essays
      identifier: essays
      url: /categories/essays/
      weight: 20
      parent: blogs
    - name: Happiness
      identifier: happiness
      url: /categories/happy/
      weight: 30
      parent: blogs

permalinks:
  posts: /posts/:slug/

taxonomies:
  tag: tags
  category: categories

markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
        title: true

# Gợi ý bài liên quan (theo categories + tags) — dùng trong single.html
related:
  includeNewer: true
  threshold: 65
  indices:
    - name: categories
      weight: 100
    - name: tags
      weight: 70

build:
  buildStats:
    disable: true

minify:
  minifyOutput: true

sitemap:
  changefreq: monthly
  priority: 0.5

outputs:
  home: [HTML, RSS, JSON]

pagination:
  pagerSize: 10

ignoreLogs:
  - warning-frontmatter-params-overrides

services:
  rss:
    limit: 50

copyright: "© {year} Kiên Trần CEO @ TRANDAO"
