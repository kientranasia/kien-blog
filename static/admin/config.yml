# Decap CMS — https://decapcms.org/
# Replace YOUR_GITHUB_USERNAME and YOUR_REPO with your GitHub repo.
# For production auth, register a GitHub OAuth App and set env vars on your host
# (see README). For local development only, you can use:
#   local_backend: true
# and run: npx decap-server

backend:
  name: github
  repo: kientranasia/kien-blog
  branch: main
  # Public origin used by the OAuth backend (nginx reverse-proxy /auth and /callback)
  base_url: https://kientran.asia
  # Optional: use a single commit without opening PRs
  # commit_messages:
  #   create: "Create {{collection}} “{{slug}}”"
  #   update: "Update {{collection}} “{{slug}}”"
  #   delete: "Delete {{collection}} “{{slug}}”"

media_folder: static/uploads
public_folder: /uploads

# Used by Decap CMS to generate correct live/admin URLs when behind a reverse proxy.
site_url: https://kientran.asia
display_url: https://kientran.asia

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: posts
    label: Essays
    label_singular: Essay
    folder: content/posts
    create: true
    # Tên file = slugify(title). KHÔNG thêm field tên "slug" — trùng biến {{slug}} trong template → lỗi rỗng/sai URL.
    identifier_field: title
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish date, name: date, widget: datetime }
      - { label: Video URL (YouTube), name: video_url, widget: string, required: false, hint: "Link YouTube để hiển thị video thay cho ảnh." }
      - { label: Images Gallery, name: images, widget: list, field: { label: Image, name: image, widget: image }, required: false, hint: "Danh sách ảnh để tạo lưới ảnh (Collage)." }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Categories, name: categories, widget: list, required: false, hint: "Primary pillar: Startup, Essays, Happy (one list item)." }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: pages
    label: Pages
    files:
      - label: Home
        name: home
        file: content/_index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: string, required: false }
          - { label: "n8n Chatbot Webhook", name: chatbot_webhook, widget: string, required: false, hint: "Địa chỉ Webhook n8n để kết nối chatbot." }
          - { label: Body, name: body, widget: markdown }
      - label: Home Sidebar
        name: home_sidebar
        file: content/home/sidebar.md
        fields:
          - { label: Title, name: title, widget: string }
          - label: Links
            name: links
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string }
          - { label: Bio (body), name: body, widget: markdown }
      - label: About
        name: about
        file: content/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: string, required: false }
          - { label: Body, name: body, widget: markdown }
      - label: Contact
        name: contact
        file: content/contact.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: string, required: false }
          - { label: Body, name: body, widget: markdown }
