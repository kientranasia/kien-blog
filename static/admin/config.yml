# Decap CMS — https://decapcms.org/
# Replace YOUR_GITHUB_USERNAME and YOUR_REPO with your GitHub repo.
# For production auth, register a GitHub OAuth App and set env vars on your host
# (see README). For local development only, you can use:
#   local_backend: true
# and run: npx decap-server

backend:
  name: github
  repo: kientranasia/kien-blog
  branch: main
  # Public origin used by the OAuth backend (nginx reverse-proxy /auth and /callback)
  base_url: https://kientran.asia
  # Optional: use a single commit without opening PRs
  # commit_messages:
  #   create: "Create {{collection}} “{{slug}}”"
  #   update: "Update {{collection}} “{{slug}}”"
  #   delete: "Delete {{collection}} “{{slug}}”"

media_folder: static/uploads
public_folder: /uploads

# Used by Decap CMS to generate correct live/admin URLs when behind a reverse proxy.
site_url: https://kientran.asia
display_url: https://kientran.asia

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: posts
    label: Essays
    label_singular: Essay
    folder: content/posts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish date, name: date, widget: datetime }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Description, name: description, widget: string, required: false }
      - { label: URL slug, name: slug, widget: string, required: false, hint: "Optional; falls back to filename." }
      - { label: Categories, name: categories, widget: list, required: false, hint: "Primary pillar: Startup, Essays, Happy (one list item)." }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: pages
    label: Pages
    files:
      - label: Home
        name: home
        file: content/_index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
      - label: About
        name: about
        file: content/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: string, required: false }
          - { label: Body, name: body, widget: markdown }
