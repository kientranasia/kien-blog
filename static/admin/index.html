<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Content · Admin</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    var PostPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        var title = entry.getIn(['data', 'title']);
        var date = entry.getIn(['data', 'date']);
        var body = this.props.widgetFor('body');
        var featuredImage = entry.getIn(['data', 'featured_image']);
        var videoUrl = entry.getIn(['data', 'video_url']);
        
        // Resolve image path
        var imageSrc = featuredImage ? this.props.getAsset(featuredImage).toString() : '';

        return h('div', { style: { padding: '20px', fontFamily: 'sans-serif', color: '#333' } },
          h('h1', { style: { margin: '0 0 10px 0', fontSize: '24px' } }, title),
          h('div', { style: { color: '#888', marginBottom: '20px', fontSize: '14px' } }, date ? date.toString() : ''),
          
          // Media Section
          videoUrl ? h('div', { style: { background: '#000', color: '#fff', padding: '10px', marginBottom: '20px', textAlign: 'center', borderRadius: '8px' } }, 
            h('span', {}, '📺 Video YouTube: ' + videoUrl)
          ) : (imageSrc ? h('img', { src: imageSrc, style: { width: '100%', borderRadius: '12px', marginBottom: '20px', maxHeight: '300px', objectFit: 'cover' } }) : null),
          
          h('div', { className: 'prose' }, 
            h('style', {}, '.prose img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; }'),
            body
          )
        );
      }
    });

    CMS.registerPreviewTemplate("posts", PostPreview);
  </script>
</body>
</html>
