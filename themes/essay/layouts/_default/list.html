{{ define "main" }}
<div class="taxo-page">
  <!-- Hidden title for SPA JS to pick up -->
  <h1 class="visually-hidden taxo-title">{{ .Title }}</h1>
  
  <div class="taxo-info-bar" style="margin-bottom: 1rem; color: var(--muted); font-size: 0.85rem; font-weight: 500;">
    {{ len .Pages }} bài viết
  </div>

  {{- if .Pages }}
  <section class="social-feed-list" aria-label="Danh sách bài viết">
    {{- range (.Paginate .Pages).Pages }}
    {{ partial "post-card.html" (dict "page" . "isFeatured" false) }}
    {{- end }}
  </section>
  {{- partial "pagination.html" . }}
  {{- end }}
</div>
{{ end }}
