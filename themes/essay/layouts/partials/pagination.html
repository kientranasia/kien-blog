{{- $p := .Paginator }}
{{- if gt $p.TotalPages 1 }}
<nav class="pagination" aria-label="Pagination">
  {{- if $p.HasPrev }}
  <a class="pagination__link" href="{{ $p.Prev.URL }}">← Mới hơn</a>
  {{- else }}
  <span class="pagination__muted" aria-hidden="true">← Mới hơn</span>
  {{- end }}
  <span class="pagination__status">Trang {{ $p.PageNumber }} / {{ $p.TotalPages }}</span>
  {{- if $p.HasNext }}
  <a class="pagination__link" href="{{ $p.Next.URL }}">Cũ hơn →</a>
  {{- else }}
  <span class="pagination__muted" aria-hidden="true">Cũ hơn →</span>
  {{- end }}
</nav>
{{- end }}
