server {
    listen 80;
    listen 1313;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Backend decap-cms-github-backend phân biệt `/auth` và `/auth/`
    # -> `/auth/` trả 404, nên normalize để Decap login hoạt động ổn định.
    location = /auth/ {
        return 301 /auth?$args;
    }

    location = /callback/ {
        return 301 /callback?$args;
    }

    # Decap CMS OAuth endpoints (for GitHub auth)
    location /auth {
        proxy_pass http://cms-backend/auth;
        proxy_set_header Host kientran.asia;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host kientran.asia;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /callback {
        proxy_pass http://cms-backend/callback;
        proxy_set_header Host kientran.asia;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host kientran.asia;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
